<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';" />
  <title>AI Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-container" class="container">
    <div class="login-box">
      <h2>Connect to Server</h2>
      <form id="login-form">
        <div class="input-group">
          <label for="host">Host</label>
          <input type="text" id="host" name="host" placeholder="e.g. 192.168.1.100" required>
        </div>
        <div class="input-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="ubuntu" required>
        </div>
        <div class="input-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" id="connect-btn">Connect</button>
        <p id="error-message" class="error"></p>
      </form>
    </div>
  </div>

  <!-- Dashboard Screen (Hidden initially) -->
  <div id="dashboard-container" class="container hidden">
    
    <div class="main-content">
      <!-- Webview for the remote UI -->
      <webview id="remote-ui" src="about:blank" class="webview-full"></webview>
    </div>

    <!-- Sidebar for SFTP Dropzone -->
    <div class="sidebar">
      <h3>Model Upload</h3>
      <div id="dropzone" class="dropzone">
        <p>Drag and drop model file here</p>
      </div>
      <div id="progress-container" class="hidden">
        <div class="progress-bar-bg">
          <div id="progress-bar-fill" class="progress-bar-fill"></div>
        </div>
        <p id="progress-text">0%</p>
      </div>
      <p id="upload-status" class="status-message"></p>
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
